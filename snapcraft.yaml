name: chatgpt-desktop-client
base: core24
version: '1.0.2'
summary: Modern ChatGPT Desktop Client
description: |
  A feature-rich desktop client for ChatGPT with enhanced OAuth support,
  conversation export, keyboard shortcuts, and improved Linux compatibility.
  Compatible with Ubuntu 24.04 and 25.04.

grade: stable
confinement: strict

apps:
  chatgpt-desktop-client:
    command: chatgpt-desktop-client
    extensions: [gnome]
    plugs:
      - network
      - network-bind
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
      - browser-support
      - audio-playback
      - home

parts:
  chatgpt-desktop-client:
    plugin: dump
    source: .
    build-packages:
      - nodejs
      - npm
    stage-packages:
      - libnss3
      - libxss1
      - libgtk-3-0
      - libgconf-2-4
      - libasound2
      - libxtst6
      - libdrm2
      - libgtk-4-1
    override-build: |
      npm install
      npm run dist:snap
      cp -r dist/* $SNAPCRAFT_PART_INSTALL/
    after:
      - desktop-gtk3
